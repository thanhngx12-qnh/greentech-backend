# -----------------------------------------------------------------------------
# File: docker-compose.yml
# -----------------------------------------------------------------------------
services:
  postgres:
    image: postgres:15-alpine
    container_name: greentech_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5439:5432' # <-- Sửa chỗ này: Map port 5433 trên máy Mac vào 5432 trong container
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: greentech_redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
